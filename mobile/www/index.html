<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AM 360</title>
  <style>
    :root { color-scheme: dark; }

      display: grid; place-items: center; color: #08080c; font-weight: 800; font-size: 28px; }
    p { color: #9d9daf; }
  </style>
</head>
